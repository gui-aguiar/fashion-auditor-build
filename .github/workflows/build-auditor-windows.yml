# Builds the Windows FashionAuditor.exe for the offline audit package.
# PyInstaller cannot cross-compile, so the .exe must be produced on Windows —
# this workflow does it on a windows-latest runner and publishes the artifact.
#
# Trigger manually (workflow_dispatch) or by pushing a tag like auditor-v*.
name: build-auditor-windows

on:
  workflow_dispatch:
  push:
    tags: ["auditor-v*"]

jobs:
  build-exe:
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: pip install pillow pyinstaller

      - name: Smoke import
        run: python -c "import auditor_app; print('import ok')"

      - name: Build FashionAuditor.exe
        run: pyinstaller --onefile --windowed --name FashionAuditor --paths . run_auditor_app.py

      - name: Verify exe exists
        shell: pwsh
        run: |
          if (!(Test-Path "dist/FashionAuditor.exe")) {
            throw "FashionAuditor.exe not found"
          }
          Get-Item "dist/FashionAuditor.exe"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FashionAuditor-windows
          path: dist/FashionAuditor.exe
          if-no-files-found: error
